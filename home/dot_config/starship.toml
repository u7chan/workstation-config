# Starship prompt configuration for workstation-config.
# Managed by chezmoi; apply changes with `chezmoi apply`.

format = """
$username$hostname$directory$git_branch$git_status$cmd_duration$status$line_break$character"""

[character]
success_symbol = '[>](bold green)'
error_symbol = '[>](bold red)'

[directory]
truncation_length = 3
truncate_to_repo = true

[cmd_duration]
min_time = 2000
format = 'took [$duration](bold yellow) '

[status]
disabled = false
format = '[$status](bold red) '
