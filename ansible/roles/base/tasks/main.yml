---
- name: Read systemd version
  ansible.builtin.command: systemctl --version
  register: systemd_version
  changed_when: false
  check_mode: false
  when:
    - ansible_facts["distribution"] == "Ubuntu"
    - ansible_facts["distribution_version"] is version("26.04", "==")
    - '"microsoft" in ansible_facts["kernel"] | lower'

- name: Create user service override directory
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/user@.service.d
    state: directory
    mode: "0755"
  when:
    - ansible_facts["distribution"] == "Ubuntu"
    - ansible_facts["distribution_version"] is version("26.04", "==")
    - '"microsoft" in ansible_facts["kernel"] | lower'
    - systemd_version.stdout is match("^systemd 259(\\s|$)")

- name: Work around systemd user session restart failure on Ubuntu 26.04 WSL2
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/user@.service.d/wsl-cgroup-workaround.conf
    content: |
      # Temporary workaround for systemd 259 on Ubuntu 26.04 WSL2.
      # Remove after the upstream DelegateSubgroup/cgroup reuse issue is fixed.
      [Service]
      DelegateSubgroup=
    mode: "0644"
  when:
    - ansible_facts["distribution"] == "Ubuntu"
    - ansible_facts["distribution_version"] is version("26.04", "==")
    - '"microsoft" in ansible_facts["kernel"] | lower'
    - systemd_version.stdout is match("^systemd 259(\\s|$)")
  notify: Reload systemd manager configuration

- name: Install explicit base package allowlist
  become: true
  ansible.builtin.apt:
    name: "{{ base_apt_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create user binary directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.local/bin"
    state: directory
    mode: "0755"

- name: Install pinned chezmoi binary
  ansible.builtin.get_url:
    url: "{{ chezmoi_url }}"
    dest: "{{ ansible_facts['user_dir'] }}/.local/bin/chezmoi"
    checksum: "{{ chezmoi_checksum }}"
    mode: "0755"

- name: Install pinned mise binary
  ansible.builtin.get_url:
    url: "{{ mise_url }}"
    dest: "{{ ansible_facts['user_dir'] }}/.local/bin/mise"
    checksum: "{{ mise_checksum }}"
    mode: "0755"

- name: Create mise configuration directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/mise"
    state: directory
    mode: "0755"

- name: Install mise global configuration
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../mise/config.toml"
    dest: "{{ ansible_facts['user_dir'] }}/.config/mise/config.toml"
    mode: "0644"

- name: Install mise lockfile
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../mise/mise.lock"
    dest: "{{ ansible_facts['user_dir'] }}/.config/mise/mise.lock"
    mode: "0644"

- name: Trust mise global configuration
  ansible.builtin.command:
    cmd: >-
      {{ ansible_facts['user_dir'] }}/.local/bin/mise trust
      {{ ansible_facts['user_dir'] }}/.config/mise/config.toml
  changed_when: false

- name: Resolve latest Herdr release before locked mise install
  ansible.builtin.command:
    cmd: "{{ ansible_facts['user_dir'] }}/.local/bin/mise upgrade herdr"
  environment:
    MISE_CONFIG_FILE: "{{ ansible_facts['user_dir'] }}/.config/mise/config.toml"
    MISE_YES: "1"
  changed_when: false

- name: Install locked mise tools before personal role tasks
  ansible.builtin.command:
    cmd: "{{ ansible_facts['user_dir'] }}/.local/bin/mise install"
  environment:
    MISE_CONFIG_FILE: "{{ ansible_facts['user_dir'] }}/.config/mise/config.toml"
    MISE_LOCKED: "1"
    MISE_YES: "1"
  changed_when: false

- name: Create workstation shell configuration directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/workstation/shell"
    state: directory
    mode: "0755"

- name: Create machine-local Bash configuration
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/workstation/shell/local.bash"
    state: touch
    access_time: preserve
    modification_time: preserve
    mode: "0600"

- name: Check for legacy Bun global safe-chain
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.bun/bin/safe-chain"
  register: legacy_bun_safe_chain

- name: Remove legacy Bun global safe-chain installation
  ansible.builtin.shell: |
    set -euo pipefail
    if [[ -x "{{ ansible_facts['user_dir'] }}/.local/bin/mise" ]]; then
      MISE_YES=1 "{{ ansible_facts['user_dir'] }}/.local/bin/mise" exec -- \
        bun remove -g @aikidosec/safe-chain
    fi
  args:
    executable: /bin/bash
  when: legacy_bun_safe_chain.stat.exists | default(false)
  register: safe_chain_bun_remove
  changed_when: safe_chain_bun_remove.rc == 0
  failed_when: false

- name: Remove legacy Bun safe-chain binary
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.bun/bin/safe-chain"
    state: absent

- name: Check currently installed Safe-chain version
  ansible.builtin.shell: |
    set -euo pipefail
    safe_chain_bin="{{ ansible_facts['user_dir'] }}/.safe-chain/bin/safe-chain"
    if [[ -x "$safe_chain_bin" ]]; then
      "$safe_chain_bin" -v 2>/dev/null | sed -n 's/.*Current safe-chain version: //p'
    fi
  args:
    executable: /bin/bash
  register: safe_chain_installed_version
  changed_when: false
  failed_when: false

- name: Download official Safe-chain installer
  ansible.builtin.get_url:
    url: "{{ safe_chain_installer_url }}"
    dest: "{{ ansible_facts['user_dir'] }}/.safe-chain-installer.sh"
    checksum: "{{ safe_chain_installer_checksum }}"
    mode: "0755"
  when: safe_chain_installed_version.stdout != safe_chain_version

- name: Install Safe-chain from official release
  ansible.builtin.command:
    cmd: "{{ ansible_facts['user_dir'] }}/.safe-chain-installer.sh"
  environment:
    SAFE_CHAIN_VERSION: "{{ safe_chain_version }}"
  register: safe_chain_install_result
  changed_when: "'already installed' not in safe_chain_install_result.stdout"
  when: safe_chain_installed_version.stdout != safe_chain_version

- name: Remove installer artifact
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.safe-chain-installer.sh"
    state: absent
  changed_when: false

- name: Keep Safe-chain shell integration out of unmanaged .bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_facts['user_dir'] }}/.bashrc"
    regexp: '^source\s+.*\.safe-chain/scripts/init-posix\.sh.*$'
    state: absent
