---
- name: Ensure agent-skills destination exists
  ansible.builtin.file:
    path: "{{ agent_skills_dest }}"
    state: directory
    mode: "0755"

- name: Clone agent-skills repository
  ansible.builtin.git:
    repo: "{{ agent_skills_repo_url }}"
    dest: "{{ agent_skills_dest }}"
    version: main
    update: true
    executable: "{{ ansible_facts['user_dir'] }}/.local/bin/workstation-update-locked-git"
  environment:
    WORKSTATION_UPDATE_STATE_DIR: "{{ ansible_facts['user_dir'] }}/.local/state/workstation-update"

- name: Ensure AI CLI configuration directories exist
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - claude
    - codex

- name: Check for old repo-level agent skills symlinks
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.{{ item }}/skills"
  register: old_skills_stat
  loop:
    - claude
    - codex

- name: Remove old repo-level agent skills symlinks
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: absent
  when: item.stat.islnk is defined and item.stat.islnk
  loop: "{{ old_skills_stat.results }}"

- name: Setup agent skills via setup-skills.py
  ansible.builtin.command:
    cmd: >
      python3 {{ agent_skills_dest }}/.scripts/setup-skills.py
      --agent {{ item }}
      --home {{ ansible_facts['user_dir'] }}
    chdir: "{{ agent_skills_dest }}"
  register: setup_skills_result
  changed_when: "'[ok]' in setup_skills_result.stdout"
  loop:
    - claude
    - codex
