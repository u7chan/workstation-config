---
- name: Ensure git config directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/git"
    state: directory
    mode: "0755"

- name: Configure personal git user settings
  ansible.builtin.template:
    src: git_config.j2
    dest: "{{ ansible_facts['user_dir'] }}/.config/git/config"
    mode: "0644"

- name: Install the AI CLI update entrypoint
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/update-ai"
    dest: "{{ ansible_facts['user_dir'] }}/.local/bin/update-ai"
    mode: "0755"

- name: Validate personal_ai_tools values
  ansible.builtin.assert:
    that:
      - item in ['codex', 'claude', 'opencode']
    fail_msg: "personal_ai_tools contains invalid value: {{ item }}"
  loop: "{{ personal_ai_tools }}"
  when: personal_ai_tools | length > 0

- name: Update selected AI CLI tools
  ansible.builtin.command:
    cmd: >-
      {{ ansible_facts['user_dir'] }}/.local/bin/mise exec node --
      {{ ansible_facts['user_dir'] }}/.local/bin/update-ai{{ personal_ai_tools | map('regex_replace', '^(.*)$', ' --\\1') | join('') }}
  environment:
    MISE_CONFIG_FILE: "{{ ansible_facts['user_dir'] }}/.config/mise/config.toml"
    MISE_LOCKED: "1"
  when: personal_ai_tools | length > 0
  changed_when: false

- name: Install personal CLI scripts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/personal-bin/{{ item }}"
    dest: "{{ ansible_facts['user_dir'] }}/.local/bin/{{ item }}"
    mode: "0755"
  loop:
    - clp
    - git-agent-cleanup
    - git-pr-cleanup
    - http
    - http-lan

- name: Configure shared agent skills
  ansible.builtin.include_tasks: agent_skills.yml
  when: personal_agent_skills_enabled | bool
