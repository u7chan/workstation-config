---
- name: Create APT keyring directory
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install Docker repository signing key
  become: true
  ansible.builtin.get_url:
    url: "{{ docker_apt_key_url }}"
    dest: "{{ docker_apt_keyring }}"
    mode: "0644"
    force: true

- name: Configure Docker stable APT repository
  become: true
  ansible.builtin.apt_repository:
    repo: "{{ docker_apt_repository }}"
    filename: docker
    state: present
    update_cache: true

- name: Install explicit Docker package allowlist
  become: true
  ansible.builtin.apt:
    name: "{{ docker_apt_packages }}"
    state: present

- name: Enable Docker services
  become: true
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - containerd.service
    - docker.service

- name: Grant the workstation user Docker access
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    groups:
      - docker
    append: true
  register: docker_group_membership

- name: Explain how to activate new Docker group membership
  ansible.builtin.debug:
    msg: >-
      Docker group membership changed. Exit all sessions for this WSL distro and
      reconnect before running Docker without sudo.
  when: docker_group_membership.changed
