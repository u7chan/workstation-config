---
workstation_profiles:
  - base
  - personal

# Keep this list small. Add packages only for a documented role need.
base_apt_packages:
  - build-essential
  - ca-certificates
  - curl
  - git
  - gh

# Optional personal role. Set this to false with Ansible extra vars when Docker
# is not wanted on a personal workstation.
personal_docker_ce_enabled: true

agent_skills_repo_url: "https://github.com/u7chan/agent-skills.git"
agent_skills_dest: "{{ ansible_facts['user_dir'] }}/workspace/agent-skills"

docker_apt_key_url: "https://download.docker.com/linux/ubuntu/gpg"
docker_apt_keyring: "/etc/apt/keyrings/docker.asc"
docker_apt_repository: >-
  deb [arch=amd64 signed-by={{ docker_apt_keyring }}]
  https://download.docker.com/linux/ubuntu
  {{ ansible_facts['distribution_release'] }} stable
docker_apt_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

chezmoi_version: "2.70.5"
chezmoi_url: "https://github.com/twpayne/chezmoi/releases/download/v{{ chezmoi_version }}/chezmoi-linux-amd64"
chezmoi_checksum: "sha256:da4f1346e3626c68cbe3620abc12134d886733420df92e32edb48d0406c7f9e5"

mise_version: "2026.7.0"
mise_url: "https://github.com/jdx/mise/releases/download/v{{ mise_version }}/mise-v{{ mise_version }}-linux-x64"
mise_checksum: "sha256:0744cb3c303baf0d308ff7b112ed41f22abb6029cb5644fd3a8ce74b29f16a68"

safe_chain_version: "1.5.12"
safe_chain_installer_url: "https://github.com/AikidoSec/safe-chain/releases/download/{{ safe_chain_version }}/install-safe-chain.sh"
safe_chain_installer_checksum: "sha256:e40995d546160bf18788dbfc6e9a4a765152abeca92014adf85102cf6b13d890"
